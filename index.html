<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joybor — Aqlli Turargoh</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --border-color: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --green: #10b981;
            --blue: #3b82f6;
            --red: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .phone-wrapper {
                order: -1;
            }
        }

        .info-side {
            text-align: left;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0 0 15px 0;
            background: linear-gradient(135deg, #ffffff 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.2rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .feat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .feat-card:hover, .feat-card.active {
            border-color: #374151;
            transform: scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .feat-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            border-radius: 16px 0 0 16px;
            transition: background 0.3s;
        }

        .feat-card.find:hover::before, .feat-card.find.active::before { background: var(--green); }
        .feat-card.claim:hover::before, .feat-card.claim.active::before { background: var(--blue); }
        .feat-card.block:hover::before, .feat-card.block.active::before { background: var(--red); }

        .feat-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .feat-card.find .feat-title { color: var(--green); }
        .feat-card.claim .feat-title { color: var(--blue); }
        .feat-card.block .feat-title { color: var(--red); }

        .feat-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .phone-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone {
            width: 300px;
            height: 600px;
            background: #000000;
            border: 12px solid #1f2937;
            border-radius: 45px;
            box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.2);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .notch {
            width: 110px;
            height: 25px;
            background: #1f2937;
            border-radius: 20px;
            margin: 15px auto 0 auto;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .app-screen {
            padding: 60px 20px 20px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            transition: all 0.5s ease;
        }

        .app-header {
            text-align: center;
        }

        .app-logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
        }

        .app-status {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
            transition: color 0.3s;
        }

        .mock-map {
            height: 200px;
            background: #111827;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .map-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .parking-spot {
            width: 55px;
            height: 55px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 1.2rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid var(--green);
            color: var(--green);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
            animation: pulse-green 2s infinite;
            z-index: 2;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(59, 130, 246,
